services:

  mongo-express:
    image: mongo-express
    container_name: ${COMPOSE_LEAD}-${COMPOSE_NAME}-client
    restart: always
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGODB_INITDB_ROOT_USERNAME}:${MONGODB_INITDB_ROOT_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGODB_EXPRESS_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGODB_EXPRESS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: ${COMPOSE_CLIENT_CPUS}
          memory: ${COMPOSE_CLIENT_MEMO} # On Docker Swarm, move resource limits into 'deploy.resources.limits'